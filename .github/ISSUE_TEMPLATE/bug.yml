name: Bug report
description: Report incorrect contract behavior or a CLI failure.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the command, output, and smallest contract configuration that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
